<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EverGuard OS">
<meta name="theme-color" content="#112A25">
<link rel="manifest" href="manifest.json">
<title>EverGuard OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#050d08;--sf:#0b1710;--s2:#112A25;--s3:#1a3a2a;
  --bd:#1c3224;--b2:#2a4a38;
  --gold:#DBB183;--g2:#9C6D32;
  --gbg:rgba(219,177,131,0.09);--gbr:rgba(219,177,131,0.2);
  --grn:#52e09a;--red:#f87171;--blu:#60a5fa;--pur:#a78bfa;
  --tx:#e6ede8;--t2:#7a9e8c;--t3:#3a5a48;
  --f:'Manrope',sans-serif;
  --sat:env(safe-area-inset-top);
  --sab:env(safe-area-inset-bottom);
}
body{background:var(--bg);color:var(--tx);font-family:var(--f);font-size:14px;min-height:100vh;}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:calc(80px + var(--sab));}
.login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.lcard{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:28px 24px;width:100%;}
.llbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:10px;}
.ubtns{display:flex;gap:10px;margin-bottom:20px;}
.ubtn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;}
.ubtn.on{background:var(--s2);border-color:var(--gbr);color:var(--gold);}
.pdots{display:flex;gap:10px;justify-content:center;margin-bottom:24px;}
.pdot{width:14px;height:14px;border-radius:50%;border:2px solid var(--b2);background:transparent;transition:all .15s;}
.pdot.on{background:var(--gold);border-color:var(--gold);}
.npad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.nkey{background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:16px;font-size:20px;font-weight:700;color:var(--tx);cursor:pointer;font-family:var(--f);text-align:center;}
.nkey:active{background:var(--s3);transform:scale(.96);}
.nkey.del{font-size:15px;color:var(--t2);}
.nkey.emp{background:transparent;border-color:transparent;cursor:default;}
.lerr{color:var(--red);font-size:12px;font-weight:700;text-align:center;margin-top:12px;min-height:18px;}
.hdr{background:var(--s2);padding:calc(13px + var(--sat)) 16px 13px;display:flex;align-items:flex-end;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--gbr);}
.hbrand{font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;font-weight:700;}
.htitle{font-size:18px;font-weight:800;color:var(--tx);}
.hright{display:flex;align-items:center;gap:6px;}
.addbtn{background:var(--gold);color:#050d08;border:none;border-radius:8px;padding:7px 13px;font-family:var(--f);font-weight:800;font-size:12px;cursor:pointer;}
.backbtn{background:transparent;color:var(--gold);border:1px solid var(--gbr);border-radius:8px;padding:5px 11px;font-size:12px;font-family:var(--f);cursor:pointer;font-weight:600;}
.ibtn{background:transparent;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:5px;border-radius:6px;}
.lout{background:transparent;border:1px solid var(--bd);color:var(--t3);border-radius:8px;padding:4px 9px;font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;}
.rbadge{font-size:9px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:1px;}
.rb-own{background:var(--gbg);color:var(--gold);border:1px solid var(--gbr);}
.rb-par{background:rgba(96,165,250,.1);color:var(--blu);border:1px solid rgba(96,165,250,.2);}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--s2);border-top:1px solid var(--gbr);display:flex;z-index:50;padding-bottom:var(--sab);}
.nb{flex:1;padding:10px 0 13px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.ni{font-size:15px;}.nl{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--t3);}
.nb.on .nl{color:var(--gold);}
.scroll{padding:14px;padding-bottom:16px;}
.sl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;margin-top:2px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;}
.field{margin-bottom:11px;}
.fl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;}
.inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:14px;font-family:var(--f);font-weight:600;outline:none;appearance:none;-webkit-appearance:none;}
.inp:focus{border-color:rgba(219,177,131,.4);}
.inp::placeholder{color:var(--t3);font-weight:400;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.brow{display:flex;gap:8px;margin-top:14px;}
.btnc{flex:1;padding:11px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer;}
.btns{flex:2;padding:11px;border-radius:8px;border:none;background:var(--gold);color:#050d08;font-family:var(--f);font-size:13px;font-weight:800;cursor:pointer;}
.btnd{flex:1;padding:11px;border-radius:8px;border:none;background:rgba(248,113,113,.15);color:var(--red);font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;}
.del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:4px;flex-shrink:0;}
.del:hover{color:var(--red);}
.empty{text-align:center;padding:40px 16px;color:var(--t3);font-size:13px;font-weight:600;}
.ghost{background:transparent;border:1px dashed var(--b2);border-radius:10px;width:100%;padding:12px;color:var(--t3);font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.ghost:hover{border-color:var(--gbr);color:var(--gold);}
.ssm{background:var(--gold);color:#050d08;border:none;border-radius:8px;padding:8px 13px;font-family:var(--f);font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0;}
.csm{background:transparent;border:1px solid var(--b2);color:var(--t2);border-radius:8px;padding:8px 11px;font-family:var(--f);font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;}
.cinp{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 11px;color:var(--tx);font-size:13px;font-family:var(--f);font-weight:600;outline:none;}
.cinp::placeholder{color:var(--t3);font-weight:400;}
.cinp:focus{border-color:rgba(219,177,131,.4);}
.prog-bg{background:var(--bd);border-radius:4px;height:4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g2),var(--gold));border-radius:4px;}
.stabs{display:flex;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:3px;margin-bottom:12px;}
.stab{flex:1;padding:7px 4px;text-align:center;font-size:10px;font-weight:700;border-radius:8px;cursor:pointer;color:var(--t3);border:none;background:transparent;font-family:var(--f);}
.stab.on{background:var(--s2);color:var(--gold);}
.datesub{font-size:12px;color:var(--t3);margin-bottom:12px;font-weight:500;}
.sbadge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.5px;display:inline-block;}
.sb-draft{background:rgba(96,165,250,.1);color:var(--blu);border:1px solid rgba(96,165,250,.2);}
.sb-sent{background:rgba(167,139,250,.1);color:var(--pur);border:1px solid rgba(167,139,250,.2);}
.sb-accepted{background:rgba(82,224,154,.1);color:var(--grn);border:1px solid rgba(82,224,154,.2);}
.sb-declined{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.sb-scheduled{background:rgba(96,165,250,.1);color:var(--blu);border:1px solid rgba(96,165,250,.2);}
.sb-inprogress{background:rgba(219,177,131,.1);color:var(--gold);border:1px solid var(--gbr);}
.sb-complete{background:rgba(82,224,154,.1);color:var(--grn);border:1px solid rgba(82,224,154,.2);}
.sb-paid{background:rgba(82,224,154,.12);color:var(--grn);border:1px solid rgba(82,224,154,.25);}
.sb-partial{background:var(--gbg);color:var(--gold);border:1px solid var(--gbr);}
.sb-unpaid{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.sb-overdue{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.sb-open{background:rgba(96,165,250,.1);color:var(--blu);border:1px solid rgba(96,165,250,.2);}
.sb-done{background:rgba(82,224,154,.1);color:var(--grn);border:1px solid rgba(82,224,154,.2);}
.sb-attached{background:rgba(82,224,154,.1);color:var(--grn);border:1px solid rgba(82,224,154,.2);}
.sb-closed{background:rgba(58,90,72,.3);color:var(--t2);border:1px solid var(--bd);}
.plb{background:var(--s2);border:1px solid var(--gbr);border-radius:14px;padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden;}
.plb::after{content:'';position:absolute;bottom:-30px;right:-20px;width:100px;height:100px;background:rgba(219,177,131,.04);border-radius:50%;}
.pll{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.plv{font-size:32px;font-weight:800;letter-spacing:-1px;}
.plm{font-size:12px;color:var(--t2);margin-top:4px;font-weight:600;}
.plr{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);}
.pli-v{font-size:14px;font-weight:800;color:var(--tx);}
.pli-l{font-size:9px;color:var(--t3);margin-top:2px;font-weight:600;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:13px;border-left:3px solid var(--bd);}
.sc.g{border-left-color:var(--gold);}
.sc.gr{border-left-color:var(--grn);}
.sc.r{border-left-color:var(--red);}
.sc.b{border-left-color:var(--blu);}
.sc-v{font-size:20px;font-weight:800;color:var(--tx);letter-spacing:-.5px;}
.sc-l{font-size:10px;color:var(--t3);margin-top:3px;font-weight:600;}
.goal-bar{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:10px;}
.client-row{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:13px;margin-bottom:8px;cursor:pointer;}
.client-row:hover{border-color:var(--gbr);}
.search-inp{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;color:var(--tx);font-size:13px;font-family:var(--f);font-weight:500;outline:none;margin-bottom:12px;}
.search-inp::placeholder{color:var(--t3);}
.search-inp:focus{border-color:var(--gbr);}
.client-hdr{background:var(--s2);border:1px solid var(--gbr);border-radius:12px;padding:16px;margin-bottom:12px;}
.doc-row{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;}
.doc-row:hover{border-color:var(--gbr);}
.jrow{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px;}
.jcosts{margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);}
.erow{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.exp-type-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:.5px;}
.et-fixed{background:rgba(96,165,250,.1);color:var(--blu);border:1px solid rgba(96,165,250,.2);}
.et-var{background:var(--gbg);color:var(--gold);border:1px solid var(--gbr);}
.et-once{background:rgba(167,139,250,.1);color:var(--pur);border:1px solid rgba(167,139,250,.2);}
.recbadge{font-size:9px;background:rgba(82,224,154,.08);color:var(--grn);border:1px solid rgba(82,224,154,.2);padding:1px 6px;border-radius:10px;margin-left:5px;font-weight:700;}
.share-row{display:flex;gap:8px;margin-top:12px;}
.share-email{flex:1;background:var(--s2);border:1px solid var(--gbr);color:var(--gold);border-radius:8px;padding:10px;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;text-align:center;}
.share-sms{flex:1;background:var(--s2);border:1px solid rgba(82,224,154,.25);color:var(--grn);border-radius:8px;padding:10px;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;text-align:center;}
.chart-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;overflow:hidden;}
.chart-legend{display:flex;gap:16px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);font-weight:600;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.task-row{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px;}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:transparent;transition:all .2s;}
.chk.dn{background:var(--gold);border-color:var(--gold);}
.task-assign{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block;}
.ta-drew{background:var(--gbg);color:var(--gold);border:1px solid var(--gbr);}
.ta-jaime{background:rgba(96,165,250,.1);color:var(--blu);border:1px solid rgba(96,165,250,.2);}
.ta-both{background:rgba(82,224,154,.08);color:var(--grn);border:1px solid rgba(82,224,154,.2);}
.assign-row{display:flex;gap:8px;}
.assign-opt{flex:1;padding:9px 6px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t3);font-family:var(--f);font-weight:700;font-size:11px;cursor:pointer;text-align:center;}
.ao-drew.on{border-color:var(--gold);background:var(--gbg);color:var(--gold);}
.ao-jaime.on{border-color:var(--blu);background:rgba(96,165,250,.08);color:var(--blu);}
.ao-both.on{border-color:var(--grn);background:rgba(82,224,154,.08);color:var(--grn);}
.li-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.li-desc{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:13px;font-family:var(--f);font-weight:500;outline:none;}
.li-desc::placeholder{color:var(--t3);}
.li-desc:focus{border-color:rgba(219,177,131,.4);}
.li-qty,.li-price{width:68px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 8px;color:var(--tx);font-size:13px;font-family:var(--f);font-weight:600;outline:none;text-align:center;}
.ali-btn{background:transparent;border:1px dashed var(--b2);border-radius:8px;color:var(--t2);font-family:var(--f);font-size:12px;font-weight:700;padding:7px;cursor:pointer;width:100%;margin-top:3px;}
.tax-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--s2);border-radius:8px;margin-top:8px;}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bd);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--gold);}
.toggle::after{content:'';width:18px;height:18px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;}
.toggle.on::after{left:23px;}
.yt{width:100%;border-collapse:collapse;}
.yt td{padding:7px 4px;font-size:12px;border-bottom:1px solid var(--bd);}
.yt tr:last-child td{border-bottom:none;}
.yt td:last-child{text-align:right;font-weight:700;}
.yt .lb{color:var(--t2);font-weight:600;}
.yt .sb2{color:var(--t3);font-weight:500;font-size:11px;padding-left:10px;}
.yt .total-row td{font-weight:800;font-size:13px;padding-top:10px;border-top:1px solid var(--bd);border-bottom:none;}
.mrow{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);}
.mrow:last-child{border-bottom:none;}
.mn2{width:28px;font-size:11px;font-weight:700;color:var(--t2);}
.mbw{flex:1;background:var(--bd);border-radius:3px;height:5px;margin:0 8px;}
.mb{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--g2),var(--gold));}
.mrv{font-size:11px;font-weight:700;color:var(--tx);width:60px;text-align:right;}
.mpr{font-size:10px;width:50px;text-align:right;font-weight:600;}
.trow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);}
.trow:last-child{border-bottom:none;}
.modal-ov{position:fixed;inset:0;background:rgba(5,13,8,.95);z-index:200;display:flex;flex-direction:column;max-width:430px;left:50%;transform:translateX(-50%);}
.modal-hdr{background:var(--s2);padding:calc(14px + var(--sat)) 16px 14px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--gbr);flex-shrink:0;}
.modal-title{font-size:16px;font-weight:800;color:var(--tx);}
.close-btn{background:transparent;border:none;color:var(--t2);font-size:22px;cursor:pointer;padding:2px 6px;line-height:1;}
#map-container{flex:1;min-height:0;background:var(--s2);}
.map-info{background:var(--s2);padding:14px 16px;border-top:1px solid var(--gbr);flex-shrink:0;padding-bottom:calc(14px + var(--sab));}
.map-stat-v{font-size:20px;font-weight:800;color:var(--tx);}
.map-stat-l{font-size:10px;color:var(--t3);font-weight:600;margin-top:2px;}
.mrf{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.mrf .mn{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:13px;font-family:var(--f);font-weight:500;outline:none;}
.mrf .mn::placeholder{color:var(--t3);}
.mrf .mc{width:78px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;color:var(--tx);font-size:13px;font-family:var(--f);font-weight:600;outline:none;}
.amb{background:transparent;border:1px dashed var(--b2);border-radius:8px;color:var(--t2);font-family:var(--f);font-size:12px;font-weight:700;padding:7px;cursor:pointer;width:100%;margin-top:3px;}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd);}
.settings-row:last-child{border-bottom:none;}
.inv-alert{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;flex-direction:column;gap:12px;}
.spin{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;}
.cal-day-lbl{text-align:center;font-size:10px;font-weight:700;color:var(--t3);padding:6px 0;letter-spacing:.5px;}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:13px;font-weight:600;color:var(--t2);}
.cal-day.has-jobs{color:var(--tx);}
.cal-day.today{background:var(--s2);color:var(--gold);}
.cal-day.selected{background:var(--gbg);border:1px solid var(--gbr);}
.cal-day.other-month{opacity:.3;}
.job-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);position:absolute;bottom:3px;}

const td = () => new Date().toISOString().split('T')[0];

function tmf(d){const n=new Date(),dt=new Date(d+'T00:00:00');return dt.getMonth()===n.getMonth()&&dt.getFullYear()===n.getFullYear();}
function smf(d,m,y){if(!d)return false;const dt=new Date(d+'T00:00:00');return dt.getMonth()===m&&dt.getFullYear()===y;}
function dfmt(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';}
function sfmt(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';}

function liT(li){return (li||[]).reduce((s,i)=>s+(i.qty*i.sell_price),0);}
function jobRevenue(j){return j.revenue||0;}
function cc(m){return m>=40?'var(--grn)':m>=20?'var(--gold)':'var(--red)';}

function calcStats(jobs, exps){
  const rev = jobs.reduce((s,j)=>s+(j.revenue||0),0);
  const mat = jobs.reduce((s,j)=>s+(j.materials_cost||0),0);
  const lab = jobs.reduce((s,j)=>s+(j.labor_cost||0),0);
  const mil = jobs.reduce((s,j)=>s+(j.mileage_amt||0),0);
  const cogs = mat+lab+mil;
  const fixed = exps.filter(e=>e.type==='Fixed').reduce((s,e)=>s+e.amount,0);
  const variable = exps.filter(e=>e.type==='Variable').reduce((s,e)=>s+e.amount,0);
  const onetime = exps.filter(e=>e.type==='One-Time').reduce((s,e)=>s+e.amount,0);
  const ovh = fixed+variable+onetime;
  const gross = rev-cogs;
  const net = gross-ovh;
  return{rev,mat,lab,mil,cogs,fixed,variable,onetime,ovh,gross,net,
    grossMargin:rev>0?gross/rev*100:0,netMargin:rev>0?net/rev*100:0,cnt:jobs.length};
}

    S.expenses=expenses||[];S.recurring=recurring||[];S.draws=draws||[];S.tasks=tasks||[];
    S.inventory=inventory||[];S.vendors=vendors||[];S.laborCatalog=labor||[];S.appLists=lists||[];
    S.purchaseOrders=pos||[];S.drawComparisons=comparisons||[];

    // counters
    const invNums=S.invoices.map(i=>parseInt(i.number?.split('-')[2]||0)).filter(n=>!isNaN(n));
    const qtNums=S.quotes.map(q=>parseInt(q.number?.split('-')[2]||0)).filter(n=>!isNaN(n));
    S.invoiceN=(invNums.length?Math.max(...invNums):0)+1;

    await checkRecurring();
  }catch(e){console.error('Load error:',e);}

async function checkRecurring(){
  const now=new Date();
  for(const r of S.recurring){
    let due=false;
    if(!r.last_logged){due=true;}
    else{const last=new Date(r.last_logged+'T00:00:00');
      if(r.frequency==='Weekly')due=(now-last)>=7*864e5;
      else if(r.frequency==='Monthly')due=now.getMonth()!==last.getMonth()||now.getFullYear()!==last.getFullYear();
      else if(r.frequency==='Quarterly'){const md=(now.getFullYear()-last.getFullYear())*12+now.getMonth()-last.getMonth();due=md>=3;}
    }
    if(due){
      const exp={date:td(),category:r.category,type:r.type||'Fixed',amount:r.amount,notes:(r.notes||'')+' [Auto]',is_recurring:true};
      const{data}=await sb.from('expenses').insert(exp).select().single();
      if(data)S.expenses.unshift(data);
      await sb.from('recurring_expenses').update({last_logged:td()}).eq('id',r.id);
      r.last_logged=td();
    }
  }
}

async function dbInsert(table,data){
  const{data:result,error}=await sb.from(table).insert(data).select().single();

  return result;
}
async function dbUpdate(table,id,data){

  if(error)throw error;
}
async function dbDelete(table,id){
  const{error}=await sb.from(table).delete().eq('id',id);

}

function getHdrState(){
  let title='Dashboard',action='',showBack=false;
  if(S.showSettings)return{title:'Settings',action,showBack};
  if(S.showMap)return{title:'Client Location',action,showBack};

  if(S.tab==='dash'){title='Dashboard';}
  else if(S.tab==='clients'){
    if(S.showAddClient||S.editClientId){title=S.editClientId?'Edit Client':'New Client';showBack=true;}
    else if(S.showAddQuote){title='New Quote';showBack=true;}
    else if(S.quoteId){title='Quote';showBack=true;}
    else if(S.clientId){const c=getC(S.clientId);title=c?.name||'Client';showBack=true;}
    else{title='Clients';action=`<button class="addbtn" onclick="S.showAddClient=true;render()">+ Client</button>`;}
  }
  else if(S.tab==='schedule'){title='Schedule';}
  else if(S.tab==='jobs'){
    if(S.showAddJob){title='New Job';showBack=true;}
    else if(S.jobId){title='Job Detail';showBack=true;}
    else if(S.showAddPO){title='New Purchase Order';showBack=true;}
    else if(S.poId){title='Purchase Order';showBack=true;}
    else{title='Jobs';action=`<button class="addbtn" onclick="openAddJob(null,null)">+ Job</button>`;}
  }
  else if(S.tab==='finance'){
    if(S.showAddInvoice){title='New Invoice';showBack=true;}
    else if(S.invoiceId){title='Invoice';showBack=true;}
    else if(S.showAddExp){title='New Expense';showBack=true;}
    else if(S.showAddDraw){title='Log Draw';showBack=true;}
    else if(S.showCompare){title='Draw Comparison';showBack=true;}
    else if(S.showAddInventory){title='Add Inventory Item';showBack=true;}
    else if(S.showAddVendor){title='Add Vendor';showBack=true;}
    else if(S.showAddLabor){title='Add Labor Type';showBack=true;}
    else{
      title='Finance';
      if(S.fsub==='invoices')action=`<button class="addbtn" onclick="openAddInvoice(null,null)">+ Invoice</button>`;
      else if(S.fsub==='expenses')action=`<button class="addbtn" onclick="S.showAddExp=true;render()">+ Expense</button>`;
      else if(S.fsub==='draws')action=`<button class="addbtn" onclick="S.showAddDraw=true;render()">+ Draw</button>`;
      else if(S.fsub==='inventory')action=`<button class="addbtn" onclick="S.showAddInventory=true;render()">+ Item</button>`;
    }
  }
  else if(S.tab==='tasks'){
    title='Tasks';
    action=`<button class="addbtn" onclick="S.showAddTask=true;S.taskAssign='Both';render()">+ Task</button>`;
  }
  return{title,action,showBack};
}

function rDash(){
  const now=new Date(),y=yn();
  const compJ=S.jobs.filter(j=>j.status==='Complete'&&new Date((j.completed_date||j.scheduled_date||td())+'T00:00:00').getFullYear()===y);
  const ytdE=S.expenses.filter(e=>new Date(e.date+'T00:00:00').getFullYear()===y);
  const mJ=compJ.filter(j=>tmf(j.completed_date||j.scheduled_date||td()));
  const mE=ytdE.filter(e=>tmf(e.date));
  const ytd=calcStats(compJ,ytdE),mo=calcStats(mJ,mE);
  const plc=ytd.net>=0?'var(--grn)':'var(--red)',moc=mo.net>=0?'var(--grn)':'var(--red)';
  const ar=S.invoices.filter(i=>i.status==='Sent'||i.status==='Partial'||i.status==='Overdue').reduce((s,i)=>s+(i.total||0)-(i.amt_received||0),0);
  const ytdDraws=S.draws.filter(d=>new Date(d.date+'T00:00:00').getFullYear()===y).reduce((s,d)=>s+d.amount,0);
  const retained=ytd.net-ytdDraws;
  const goalPct=Math.min(Math.round(mo.rev/(S.goal||1)*100),100);
  const goalC=goalPct>=100?'var(--grn)':goalPct>=60?'var(--gold)':'var(--red)';
  const openTasks=S.tasks.filter(t=>t.status==='open').length;
  const lowStock=S.inventory.filter(i=>i.qty_on_hand<=i.low_stock_threshold&&i.is_active);
  const pendingCompare=S.drawComparisons.find(c=>c.status==='Pending');

  let h=`<div class="datesub">${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>`;

  // Low stock alerts
  if(lowStock.length){h+=`<div class="inv-alert"><span style="font-size:16px">⚠️</span><div><div style="font-size:12px;font-weight:800;color:var(--red)">${lowStock.length} item${lowStock.length>1?'s':''} low on stock</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${lowStock.slice(0,3).map(i=>i.name).join(', ')}${lowStock.length>3?` +${lowStock.length-3} more`:''}</div></div></div>`;}

  // Draw comparison pending
  if(pendingCompare){
    const myApproval=S.role==='owner'?pendingCompare.drew_approved:pendingCompare.jaime_approved;
    if(!myApproval){h+=`<div style="background:var(--gbg);border:1px solid var(--gbr);border-radius:10px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:700;color:var(--gold)">Draw comparison requested</div><button class="ssm" onclick="approveCompare('${pendingCompare.id}')">Approve</button></div>`;}

// ─── SCHEDULE ─────────────────────────────────────────────
function rSchedule(){
  const now=new Date();
  const y=S.calYear,m=S.calMonth;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const todayStr=td();

  // Get jobs for this month
  const monthJobs=S.jobs.filter(j=>smf(j.scheduled_date,m,y));
  const jobsByDate={};
  monthJobs.forEach(j=>{
    const d=j.scheduled_date;
    if(!jobsByDate[d])jobsByDate[d]=[];
    jobsByDate[d].push(j);
  });

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 16px">
    <button onclick="prevMonth()" style="background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px 8px">‹</button>
    <div style="font-size:16px;font-weight:800">${MONTHS[m]} ${y}</div>
    <button onclick="nextMonth()" style="background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px 8px">›</button>
  </div>`;

  h+=`<div class="cal-grid">`;
  DAYS.forEach(d=>h+=`<div class="cal-day-lbl">${d[0]}</div>`);

  // Previous month padding
  for(let i=0;i<firstDay;i++){
    const day=prevDays-firstDay+i+1;
    h+=`<div class="cal-day other-month">${day}</div>`;
  }

  // Current month days
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const hasJobs=jobsByDate[dateStr]?.length>0;
    const isToday=dateStr===todayStr;
    const isSelected=S.calSelected===dateStr;
    const cls=['cal-day',hasJobs?'has-jobs':'',isToday?'today':'',isSelected?'selected':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}" onclick="S.calSelected='${dateStr}';render()">${day}${hasJobs?`<div class="job-dot"></div>`:''}</div>`;
  }

  // Next month padding
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=1;i<=totalCells-firstDay-daysInMonth;i++){
    h+=`<div class="cal-day other-month">${i}</div>`;
  }
  h+=`</div>`;

  // Selected day jobs
  if(S.calSelected){
    const selJobs=jobsByDate[S.calSelected]||[];
    h+=`<div class="sl">${sfmt(S.calSelected)} — ${selJobs.length} job${selJobs.length!==1?'s':''}</div>`;
    if(!selJobs.length)h+=`<div style="color:var(--t3);font-size:13px;font-weight:600;padding:12px 0">No jobs scheduled</div>`;
    selJobs.forEach(j=>{
      const c=getC(j.client_id);
      h+=`<div class="cal-job-row" onclick="S.tab='jobs';S.jobId='${j.id}';render()">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:14px;font-weight:700">${c?.name||'Unknown'}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${j.job_type} · ${j.technician}</div></div>
          <span class="sbadge sb-${(j.status||'').toLowerCase().replace(' ','')}">${j.status}</span>
        </div>
      </div>`;
    });
  } else {
    // Show month summary
    h+=`<div class="sl">This Month — ${monthJobs.length} jobs scheduled</div>`;
    if(!monthJobs.length)h+=`<div class="empty">No jobs scheduled this month</div>`;
    monthJobs.slice(0,5).forEach(j=>{
      const c=getC(j.client_id);
      h+=`<div class="cal-job-row" onclick="S.tab='jobs';S.jobId='${j.id}';render()">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:14px;font-weight:700">${c?.name||'Unknown'}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${sfmt(j.scheduled_date)} · ${j.job_type} · ${j.technician}</div></div>
          <span class="sbadge sb-${(j.status||'').toLowerCase().replace(' ','')}">${j.status}</span>
        </div>
      </div>`;
    });
  }
  return h;
}

function prevMonth(){S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--;}S.calSelected=null;render();}
function nextMonth(){S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++;}S.calSelected=null;render();}

async function saveClient(){
  const name=(document.getElementById('cf-name')?.value||'').trim();
  if(!name){document.getElementById('cf-name').style.borderColor='var(--red)';return;}
  const taxExempt=document.getElementById('tax-exempt-toggle')?.classList.contains('on');
  const data={name,company:document.getElementById('cf-co')?.value||'',phone:document.getElementById('cf-phone')?.value||'',email:document.getElementById('cf-email')?.value||'',address:document.getElementById('cf-addr')?.value||'',tax_exempt:taxExempt,tax_exempt_number:document.getElementById('cf-exempt-num')?.value||'',notes:document.getElementById('cf-notes')?.value||''};
  showLoading('Saving client...');
  try{
    if(S.editClientId){await dbUpdate('clients',S.editClientId,data);S.clients=S.clients.map(c=>c.id===S.editClientId?{...c,...data}:c);S.clientId=S.editClientId;S.editClientId=null;}
    else{const result=await dbInsert('clients',data);S.clients.unshift(result);S.clientId=result.id;}
    S.showAddClient=false;S.clientTab='info';
  }catch(e){alert('Error saving client: '+e.message);}
  hideLoading();render();
}
function editClient(id){S.editClientId=id;S.showAddClient=false;render();}
async function deleteClient(id){
  if(!confirm('Delete client and all associated records?'))return;
  showLoading('Deleting...');
  try{await dbDelete('clients',id);S.clients=S.clients.filter(c=>c.id!==id);S.quotes=S.quotes.filter(q=>q.client_id!==id);S.jobs=S.jobs.filter(j=>j.client_id!==id);S.invoices=S.invoices.filter(i=>i.client_id!==id);S.clientId=null;}
  catch(e){alert('Error: '+e.message);}
  hideLoading();render();
}

function updateDocTotal(totalId,conId){
  const rows=document.querySelectorAll(`#${conId} .li-row`);
  let sub=0;
  rows.forEach(r=>{const qty=parseFloat(r.querySelector('.li-qty')?.value)||1;const price=parseFloat(r.querySelector('.li-price')?.value)||0;sub+=qty*price;});
  const tax=S.taxEnabled?sub*S.taxRate/100:0;
  const t=document.getElementById(totalId);
  if(t)t.textContent=`Total: ${fmt2(sub+tax)}${S.taxEnabled?` (incl. ${AZ_TAX}% tax)`:''}`;
}

function getLIsFromDOM(conId){
  return Array.from(document.querySelectorAll(`#${conId} .li-row`)).map(r=>{
    const descEl=r.querySelector('.li-desc');
    const desc=descEl?.tagName==='SELECT'?(descEl.options[descEl.selectedIndex]?.getAttribute('data-desc')||descEl.value):descEl?.value||'';
    return{description:desc,qty:parseFloat(r.querySelector('.li-qty')?.value)||1,sell_price:parseFloat(r.querySelector('.li-price')?.value)||0};
  }).filter(i=>i.description||i.sell_price>0);
}

async function saveJob(){
  const rev=parseFloat(document.getElementById('jf-rev')?.value||0);
  const clientId=S.jobClientId||document.getElementById('jf-client')?.value;
  if(!clientId){alert('Select a client');return;}
  const miles=parseFloat(document.getElementById('jf-miles')?.value||0);
  const mileageAmt=parseFloat(document.getElementById('jf-milamt')?.value||(miles*IRS))||0;
  const status=document.getElementById('jf-status')?.value||'Scheduled';
  const lis=getLIsFromDOM('jf-li-con');
  const matCost=lis.filter(l=>l.type!=='labor').reduce((s,l)=>s+l.qty*(parseFloat(l.cost_price)||0),0);
  const labCost=lis.filter(l=>l.type==='labor').reduce((s,l)=>s+l.qty*(parseFloat(l.cost_price)||0),0);
  const poId=document.getElementById('jf-po')?.value||null;

  const job={client_id:clientId,quote_id:S.jobFromQuote||null,po_id:poId||null,job_type:document.getElementById('jf-type')?.value,technician:document.getElementById('jf-tech')?.value,scheduled_date:document.getElementById('jf-date')?.value||td(),status,revenue:rev,line_items:lis,materials_cost:matCost,labor_cost:labCost,miles,mileage_amt:mileageAmt,notes:document.getElementById('jf-notes')?.value||'',completed_date:status==='Complete'?td():null};

  showLoading('Saving job...');
  try{
    const result=await dbInsert('jobs',job);
    S.jobs.unshift(result);
    if(S.jobFromQuote)await updateQuoteStatus(S.jobFromQuote,'Accepted');
    if(poId){await dbUpdate('purchase_orders',poId,{job_id:result.id,status:'Attached'});S.purchaseOrders=S.purchaseOrders.map(p=>p.id===poId?{...p,job_id:result.id,status:'Attached'}:p);}
    // Decrement inventory
    for(const li of lis){if(li.inventory_id){const item=S.inventory.find(i=>i.id===li.inventory_id);if(item){const newQty=Math.max(0,(item.qty_on_hand||0)-li.qty);await dbUpdate('inventory',li.inventory_id,{qty_on_hand:newQty});S.inventory=S.inventory.map(i=>i.id===li.inventory_id?{...i,qty_on_hand:newQty}:i);}}}
    S.showAddJob=false;S.jobClientId=null;S.jobFromQuote=null;S.jobId=result.id;
  }catch(e){alert('Error: '+e.message);}
  hideLoading();render();
}

async function updatePOStatus(id,status){try{await dbUpdate('purchase_orders',id,{status});S.purchaseOrders=S.purchaseOrders.map(p=>p.id===id?{...p,status}:p);render();}catch(e){alert('Error: '+e.message);}}
async function deletePO(id){if(!confirm('Delete PO?'))return;try{await dbDelete('purchase_orders',id);S.purchaseOrders=S.purchaseOrders.filter(p=>p.id!==id);S.poId=null;render();}catch(e){alert('Error: '+e.message);}}

// ─── FINANCE ─────────────────────────────────────────────
function rFinance(){
  if(S.showAddInvoice)return rAddInvoiceForm();
  if(S.invoiceId)return rInvoiceDetail();
  if(S.showAddExp)return rAddExpForm();
  if(S.showAddDraw)return rAddDrawForm();
  if(S.showCompare)return rCompareView();
  if(S.showAddInventory)return rAddInventoryForm();
  if(S.showAddVendor)return rAddVendorForm();
  if(S.showAddLabor)return rAddLaborForm();
  let h=`<div class="stabs"><button class="stab ${S.fsub==='invoices'?'on':''}" onclick="S.fsub='invoices';render()">Invoices</button><button class="stab ${S.fsub==='expenses'?'on':''}" onclick="S.fsub='expenses';render()">Expenses</button><button class="stab ${S.fsub==='draws'?'on':''}" onclick="S.fsub='draws';render()">Draws</button><button class="stab ${S.fsub==='inventory'?'on':''}" onclick="S.fsub='inventory';render()">Inventory</button><button class="stab ${S.fsub==='report'?'on':''}" onclick="S.fsub='report';render()">P&L</button></div>`;
  if(S.fsub==='invoices')h+=rInvoiceList();
  else if(S.fsub==='expenses')h+=rExpenses();
  else if(S.fsub==='draws')h+=rDraws();
  else if(S.fsub==='inventory')h+=rInventory();
  else h+=rReport();
  return h;
}

function rInvoiceList(){
  if(!S.invoices.length)return`<div class="empty">No invoices yet.<br>Create from a completed job or tap <strong>+ Invoice</strong>.</div>`;
  let h='';
  S.invoices.forEach(i=>{const c=getC(i.client_id);h+=`<div class="doc-row" onclick="S.invoiceId='${i.id}';render()"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;font-weight:800;color:var(--t3)">${i.number}</div><div style="font-size:14px;font-weight:700;margin-top:2px">${c?.name||'Unknown'}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">Due ${dfmt(i.due_date)}</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:800;color:var(--gold)">${fmt2(i.total||0)}</div><span class="sbadge sb-${(i.status||'draft').toLowerCase()}" style="margin-top:4px;display:block">${i.status}</span></div></div></div>`;});
  return h;
}

function rInvoiceDetail(){
  const inv=getInv(S.invoiceId);if(!inv)return'';
  const c=getC(inv.client_id);
  const lis=inv.line_items||[];
  const sub=lis.reduce((s,i)=>s+i.qty*i.sell_price,0);
  const tax=inv.tax_enabled?sub*inv.tax_rate/100:0;

  let h=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px"><div><div style="font-size:11px;font-weight:800;color:var(--t3)">${inv.number}</div><div style="font-size:16px;font-weight:800;margin-top:4px">${c?.name||'Unknown'}</div><div style="font-size:12px;color:var(--t2);margin-top:4px">Issued: ${dfmt(inv.created_at)}</div></div><div style="text-align:right"><span class="sbadge sb-${(inv.status||'draft').toLowerCase()}">${inv.status}</span><div style="font-size:20px;font-weight:800;color:var(--gold);margin-top:8px">${fmt2(inv.total||0)}</div></div></div><table class="yt"><tr><td class="lb" style="width:45%">Description</td><td class="lb" style="text-align:center">Qty</td><td class="lb">Price</td><td class="lb">Total</td></tr>${lis.map(i=>`<tr><td>${i.description}</td><td style="text-align:center">${i.qty}</td><td>${fmt2(i.sell_price)}</td><td>${fmt2(i.qty*i.sell_price)}</td></tr>`).join('')}<tr><td class="lb" colspan="3">Subtotal</td><td>${fmt2(sub)}</td></tr>${inv.tax_enabled?`<tr><td class="lb" colspan="3">Tax (${inv.tax_rate}%)</td><td>${fmt2(tax)}</td></tr>`:''}<tr class="total-row"><td colspan="3">Total Due</td><td style="color:var(--gold)">${fmt2(inv.total||0)}</td></tr>${inv.amt_received?`<tr><td class="lb" colspan="3">Received</td><td style="color:var(--grn)">${fmt2(inv.amt_received)}</td></tr>`:''}</table>${inv.payment_method?`<div style="font-size:12px;color:var(--t2);margin-top:10px">Payment: ${inv.payment_method}</div>`:''} ${inv.notes?`<div style="font-size:12px;color:var(--t2);margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)">${inv.notes}</div>`:''}</div>`;

  h+=`<div class="card"><div class="sl">Payment Status</div><div style="display:flex;gap:6px;flex-wrap:wrap">${INV_STATUS.map(s=>`<button onclick="updateInvStatus('${inv.id}','${s}')" style="flex:1;min-width:60px;padding:7px 4px;border-radius:8px;border:1px solid ${inv.status===s?'var(--gold)':'var(--b2)'};background:${inv.status===s?'var(--gbg)':'transparent'};color:${inv.status===s?'var(--gold)':'var(--t3)'};font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer">${s}</button>`).join('')}</div>${inv.status==='Partial'?`<div style="display:flex;gap:8px;margin-top:10px"><input type="number" class="inp" id="partial-amt" placeholder="Amount received" value="${inv.amt_received||''}" style="flex:1"><select class="inp" id="partial-method" style="background:var(--s2);width:120px">${PAY_METHODS.map(m=>`<option ${m===inv.payment_method?'selected':''}>${m}</option>`).join('')}</select><button class="ssm" onclick="savePartial('${inv.id}')">Save</button></div>`:''}</div>`;

  h+=`<div class="card"><div class="sl">Send to Client</div><div class="share-row">${c?.email?`<button class="share-email" onclick="shareInvEmail('${inv.id}')">✉ Email</button>`:''}${c?.phone?`<button class="share-sms" onclick="shareInvSMS('${inv.id}')">💬 Text</button>`:''}</div>${!c?.email&&!c?.phone?`<div style="font-size:12px;color:var(--t3)">Add client contact info to send</div>`:''}</div>`;
  h+=`<button class="btnd" style="width:100%;padding:11px;margin-top:4px" onclick="deleteInvoice('${inv.id}')">Delete Invoice</button>`;
  return h;
}

function addInvLI(typeNum){
  const c=document.getElementById('inv-li-con');if(!c)return;
  const id='ili'+Date.now();const d=document.createElement('div');d.className='li-row';d.id=id;
  let desc='';
  if(typeNum===1){
    const opts=S.laborCatalog.filter(l=>l.is_active).map(l=>'<option value="'+l.sell_rate+'" data-desc="'+l.name+'">'+l.name+' ($'+l.sell_rate+')</option>').join('');
    desc='<select class="li-desc" onchange="this.parentElement.querySelector(\'.li-price\').value=this.value;updateDocTotal(\'inv-total\',\'inv-li-con\')"><option value="">Select labor...</option>'+opts+'</select>';
  } else if(typeNum===0){
    const opts=S.inventory.filter(i=>i.is_active).map(i=>'<option value="'+i.sell_price+'" data-desc="'+i.name+'">'+i.name+' ($'+i.sell_price+')</option>').join('');
    desc='<select class="li-desc" onchange="this.parentElement.querySelector(\'.li-price\').value=this.value;updateDocTotal(\'inv-total\',\'inv-li-con\')"><option value="">Select part...</option>'+opts+'</select>';
  } else {
    desc='<input class="li-desc" placeholder="Description" oninput="updateDocTotal(\'inv-total\',\'inv-li-con\')">';
  }
  d.innerHTML=desc+'<input class="li-qty" type="number" placeholder="1" value="1" oninput="updateDocTotal(\'inv-total\',\'inv-li-con\')"><input class="li-price" type="number" placeholder="0.00" oninput="updateDocTotal(\'inv-total\',\'inv-li-con\')"><button class="del" onclick="document.getElementById(\''+id+'\').remove();updateDocTotal(\'inv-total\',\'inv-li-con\')">✕</button>';
  c.appendChild(d);updateDocTotal('inv-total','inv-li-con');
}

async function saveInvoice(){
  const clientId=S.invClientId||(S.invJobId?getJ(S.invJobId)?.client_id:null)||document.getElementById('inv-client')?.value;
  if(!clientId){alert('Select a client');return;}
  const c=getC(clientId);
  const lis=getLIsFromDOM('inv-li-con');
  const sub=lis.reduce((s,i)=>s+i.qty*i.sell_price,0);
  const taxEnabled=c?.tax_exempt?false:S.taxEnabled;
  const tax=taxEnabled?sub*S.taxRate/100:0;
  const inv={client_id:clientId,job_id:S.invJobId||null,number:nextInvNum(),line_items:lis,tax_enabled:taxEnabled,tax_rate:S.taxRate,subtotal:sub,tax,total:sub+tax,status:'Draft',amt_received:0,due_date:document.getElementById('if-due')?.value||null,payment_method:document.getElementById('if-method')?.value||'',notes:document.getElementById('if-notes')?.value||''};
  showLoading('Saving invoice...');
  try{const result=await dbInsert('invoices',inv);S.invoices.unshift(result);S.invoiceN++;S.showAddInvoice=false;S.invClientId=null;S.invJobId=null;S.invoiceId=result.id;}
  catch(e){alert('Error: '+e.message);}
  hideLoading();render();
}

async function updateInvStatus(id,status){
  const inv=getInv(id);const data={status,amt_received:status==='Paid'?(inv?.total||0):inv?.amt_received||0};
  try{await dbUpdate('invoices',id,data);S.invoices=S.invoices.map(i=>i.id===id?{...i,...data}:i);render();}catch(e){alert('Error: '+e.message);}
}
async function savePartial(id){
  const v=parseFloat(document.getElementById('partial-amt')?.value||0);
  const method=document.getElementById('partial-method')?.value||'';
  const data={amt_received:v,status:v>=(getInv(id)?.total||0)?'Paid':'Partial',payment_method:method};
  try{await dbUpdate('invoices',id,data);S.invoices=S.invoices.map(i=>i.id===id?{...i,...data}:i);render();}catch(e){alert('Error: '+e.message);}
}
async function deleteInvoice(id){if(!confirm('Delete?'))return;try{await dbDelete('invoices',id);S.invoices=S.invoices.filter(i=>i.id!==id);S.invoiceId=null;render();}catch(e){alert('Error: '+e.message);}}
function openAddInvoice(cid,jid){S.showAddInvoice=true;S.invClientId=cid;S.invJobId=jid;S.taxEnabled=false;render();setTimeout(prefillInvoiceItems,200);}

function rExpenses(){
  const types=['All','Fixed','Variable','One-Time'];
  let h='';
  if(S.recurring.length||S.showAddRec){
    h+=`<div class="sl">Recurring</div>`;
    S.recurring.forEach(r=>{h+=`<div class="erow"><div><div style="font-size:13px;font-weight:700">${r.category} <span class="recbadge">${r.frequency}</span></div><div style="font-size:11px;color:var(--t3);margin-top:2px"><span class="exp-type-badge et-${r.type==='Fixed'?'fixed':r.type==='Variable'?'var':'once'}">${r.type}</span> · Last: ${r.last_logged||'Never'}</div></div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:14px;font-weight:800;color:var(--red)">${fmt(r.amount)}</div><button class="del" onclick="deleteRec('${r.id}')">✕</button></div></div>`;});
    h+=`<button class="ghost" onclick="S.showAddRec=!S.showAddRec;render()">+ Add Recurring</button>`;
    if(S.showAddRec)h+=rRecForm();
  } else {
    h+=`<button class="ghost" style="margin-bottom:12px" onclick="S.showAddRec=true;render()">+ Set Up Recurring</button>`;
    if(S.showAddRec)h+=rRecForm();
  }

  const ytdE=S.expenses.filter(e=>new Date(e.date+'T00:00:00').getFullYear()===yn());
  const totals={Fixed:ytdE.filter(e=>e.type==='Fixed').reduce((s,e)=>s+e.amount,0),Variable:ytdE.filter(e=>e.type==='Variable').reduce((s,e)=>s+e.amount,0),'One-Time':ytdE.filter(e=>e.type==='One-Time').reduce((s,e)=>s+e.amount,0)};

  h+=`<div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px">${types.map(t=>`<button onclick="S.esub='${t}';render()" style="padding:6px 12px;border-radius:20px;border:1px solid ${S.esub===t?'var(--gold)':'var(--b2)'};background:${S.esub===t?'var(--gbg)':'transparent'};color:${S.esub===t?'var(--gold)':'var(--t3)'};font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">${t}</button>`).join('')}</div>`;
  h+=`<div class="sgrid" style="margin-bottom:10px"><div class="sc b"><div class="sc-v">${fmt(totals.Fixed)}</div><div class="sc-l">Fixed YTD</div></div><div class="sc g"><div class="sc-v">${fmt(totals.Variable)}</div><div class="sc-l">Variable YTD</div></div></div>`;

  const filtered=S.esub==='All'?S.expenses:S.expenses.filter(e=>e.type===S.esub);
  if(!filtered.length)h+=`<div class="empty">No ${S.esub==='All'?'':S.esub.toLowerCase()+' '}expenses.</div>`;
  filtered.forEach(e=>{const tc=e.type==='Fixed'?'et-fixed':e.type==='Variable'?'et-var':'et-once';h+=`<div class="erow"><div><div style="font-size:13px;font-weight:700">${e.category}${e.is_recurring?`<span class="recbadge">AUTO</span>`:''}</div><div style="font-size:11px;color:var(--t3);margin-top:2px"><span class="exp-type-badge ${tc}">${e.type}</span> · ${sfmt(e.date)}${e.notes?' · '+e.notes:''}</div></div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:14px;font-weight:800;color:var(--red)">${fmt(e.amount)}</div><button class="del" onclick="deleteExp('${e.id}')">✕</button></div></div>`;});
  return h;
}

// ─── DRAWS ────────────────────────────────────────────────
function rDraws(){
  const myDraws=S.draws.filter(d=>d.person===(S.role==='owner'?'Drew':'Jaime'));
  const myYTD=myDraws.filter(d=>new Date(d.date+'T00:00:00').getFullYear()===yn()).reduce((s,d)=>s+d.amount,0);
  const allYTD=S.draws.filter(d=>new Date(d.date+'T00:00:00').getFullYear()===yn()).reduce((s,d)=>s+d.amount,0);
  const pendingCompare=S.drawComparisons.find(c=>c.status==='Pending');
  const approvedCompare=S.drawComparisons.find(c=>c.status==='Approved');

  let h=`<div class="sgrid" style="margin-bottom:12px"><div class="sc g"><div class="sc-v">${fmt(myYTD)}</div><div class="sc-l">My Draws YTD</div></div><div class="sc b"><div class="sc-v">${fmt(allYTD)}</div><div class="sc-l">Combined YTD</div></div></div>`;

  // Compare feature
  if(approvedCompare){
    h+=rCompareView(approvedCompare);
  } else if(pendingCompare){
    const myApproval=S.role==='owner'?pendingCompare.drew_approved:pendingCompare.jaime_approved;
    const otherApproval=S.role==='owner'?pendingCompare.jaime_approved:pendingCompare.drew_approved;
    h+=`<div class="compare-card"><div class="pll">Draw Comparison Request</div><div style="font-size:13px;color:var(--t2);margin-top:4px">Requested by ${pendingCompare.requested_by} · Expires ${dfmt(pendingCompare.expires_at)}</div><div style="display:flex;gap:10px;margin-top:12px"><div style="flex:1;text-align:center"><div style="font-size:11px;color:var(--t3);margin-bottom:4px">Drew</div><div style="font-size:16px">${pendingCompare.drew_approved?'✅':'⏳'}</div></div><div style="flex:1;text-align:center"><div style="font-size:11px;color:var(--t3);margin-bottom:4px">Jaime</div><div style="font-size:16px">${pendingCompare.jaime_approved?'✅':'⏳'}</div></div></div>${!myApproval?`<button class="btns" style="width:100%;margin-top:12px" onclick="approveCompare('${pendingCompare.id}')">Approve</button>`:`<div style="font-size:12px;color:var(--t2);text-align:center;margin-top:10px">Waiting for ${S.role==='owner'?'Jaime':'Drew'} to approve</div>`}</div>`;
  } else {
    h+=`<button class="ghost" onclick="requestCompare()">Request Draw Comparison</button>`;
  }

  // Draw chart
  h+=drawChart();

  h+=`<div class="sl" style="margin-top:4px">My Draw History</div>`;
  if(!myDraws.length)h+=`<div class="empty">No draws logged yet.</div>`;
  myDraws.slice(0,15).forEach(d=>{h+=`<div class="erow"><div><div style="font-size:13px;font-weight:700;color:${S.role==='owner'?'var(--gold)':'var(--blu)'}">${d.person}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${sfmt(d.date)}${d.notes?' · '+d.notes:''}</div></div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:14px;font-weight:800">${fmt(d.amount)}</div><button class="del" onclick="deleteDraw('${d.id}')">✕</button></div></div>`;});
  return h;
}

function rCompareView(compare){
  if(!compare)return'';
  const y=yn();
  const drewYTD=S.draws.filter(d=>d.person==='Drew'&&new Date(d.date+'T00:00:00').getFullYear()===y).reduce((s,d)=>s+d.amount,0);
  const jaimeYTD=S.draws.filter(d=>d.person==='Jaime'&&new Date(d.date+'T00:00:00').getFullYear()===y).reduce((s,d)=>s+d.amount,0);
  return`<div class="compare-card"><div class="pll">Draw Comparison — ${y} YTD</div><div class="compare-person"><div><div style="font-size:14px;font-weight:800">Drew</div></div><div style="font-size:20px;font-weight:800;color:var(--gold)">${fmt(drewYTD)}</div></div><div class="compare-person"><div><div style="font-size:14px;font-weight:800">Jaime</div></div><div style="font-size:20px;font-weight:800;color:var(--blu)">${fmt(jaimeYTD)}</div></div><div style="padding-top:12px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;margin-top:4px"><div style="font-size:12px;color:var(--t2)">Difference</div><div style="font-size:14px;font-weight:800">${fmt(Math.abs(drewYTD-jaimeYTD))}</div></div><button class="btnd" style="width:100%;margin-top:12px" onclick="closeCompare('${compare.id}')">Close Comparison</button></div>`;
}

async function requestCompare(){
  const data={requested_by:S.role==='owner'?'Drew':'Jaime',drew_approved:S.role==='owner',jaime_approved:S.role==='partner',status:'Pending'};
  try{const r=await dbInsert('draw_comparisons',data);S.drawComparisons.unshift(r);render();}catch(e){alert('Error: '+e.message);}
}
async function approveCompare(id){
  const field=S.role==='owner'?'drew_approved':'jaime_approved';
  const compare=S.drawComparisons.find(c=>c.id===id);
  const otherApproved=S.role==='owner'?compare?.jaime_approved:compare?.drew_approved;
  const data={[field]:true,status:otherApproved?'Approved':'Pending'};
  try{await dbUpdate('draw_comparisons',id,data);S.drawComparisons=S.drawComparisons.map(c=>c.id===id?{...c,...data}:c);render();}catch(e){alert('Error: '+e.message);}
}
async function closeCompare(id){
  try{await dbUpdate('draw_comparisons',id,{status:'Closed',closed_at:td()});S.drawComparisons=S.drawComparisons.map(c=>c.id===id?{...c,status:'Closed',closed_at:td()}:c);render();}catch(e){alert('Error: '+e.message);}
}

function drawChart(){
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({m:d.getMonth(),y:d.getFullYear(),label:MONTHS[d.getMonth()]});}
  const myKey=S.role==='owner'?'Drew':'Jaime';
  const mData=months.map(({m,y,label})=>{
    const mine=S.draws.filter(d=>d.person===myKey&&smf(d.date,m,y)).reduce((s,d)=>s+d.amount,0);
    return{label,mine};
  });
  const maxVal=Math.max(...mData.map(d=>d.mine),1);
  const W=340,H=100,pad=20,bw=28;
  let bars='';
  mData.forEach((d,i)=>{
    const x=pad+i*(bw+10);
    const h2=Math.max(d.mine/maxVal*(H-20),d.mine>0?2:0);
    const color=S.role==='owner'?'#DBB183':'#60a5fa';
    bars+=`<rect x="${x}" y="${H-h2}" width="${bw}" height="${h2}" rx="3" fill="${color}" opacity="0.85"/>`;
    bars+=`<text x="${x+bw/2}" y="${H+14}" text-anchor="middle" font-size="10" fill="#3a5a48" font-family="Manrope">${d.label}</text>`;
    if(d.mine>0)bars+=`<text x="${x+bw/2}" y="${H-h2-4}" text-anchor="middle" font-size="9" fill="${color}" font-family="Manrope">$${Math.round(d.mine/1000)}k</text>`;
  });
  return`<div class="chart-wrap"><div style="font-size:11px;color:var(--t2);font-weight:700;margin-bottom:10px">My Draws — Last 6 Months</div><svg viewBox="0 0 ${W} ${H+20}" width="100%" style="overflow:visible">${bars}<line x1="${pad-5}" y1="${H}" x2="${W}" y2="${H}" stroke="#1c3224" stroke-width="1"/></svg></div>`;
}

function rInventory(){
  const lowStock=S.inventory.filter(i=>i.qty_on_hand<=i.low_stock_threshold&&i.is_active);
  let h='';
  if(lowStock.length){h+=`<div class="sl">⚠️ Low Stock</div>`;lowStock.forEach(i=>{h+=`<div class="low-stock">${i.name} — ${i.qty_on_hand} remaining (threshold: ${i.low_stock_threshold})</div>`;});}

  // Sub tabs
  h+=`<div class="stabs"><button class="stab ${S.esub==='items'||!S.esub||S.esub==='All'?'on':''}" onclick="S.esub='items';render()">Parts</button><button class="stab ${S.esub==='labor'?'on':''}" onclick="S.esub='labor';render()">Labor</button><button class="stab ${S.esub==='vendors'?'on':''}" onclick="S.esub='vendors';render()">Vendors</button></div>`;

  if(S.esub==='labor'){
    h+=`<button class="ghost" onclick="S.showAddLabor=true;render()">+ Add Labor Type</button>`;
    S.laborCatalog.forEach(l=>{h+=`<div class="erow"><div><div style="font-size:13px;font-weight:700">${l.name}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${l.unit} · ${l.description||'—'}</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:800;color:var(--gold)">${fmt2(l.sell_rate||0)}</div><div style="font-size:10px;color:var(--t3)">cost: ${fmt2(l.cost_rate||0)}</div></div></div>`;});
    if(!S.laborCatalog.length)h+=`<div class="empty">No labor types yet.</div>`;
  } else if(S.esub==='vendors'){
    h+=`<button class="ghost" onclick="S.showAddVendor=true;render()">+ Add Vendor</button>`;
    S.vendors.forEach(v=>{h+=`<div class="erow"><div><div style="font-size:13px;font-weight:700">${v.name}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${v.phone||''} ${v.account_number?'· Acct: '+v.account_number:''}</div></div><button class="del" onclick="deleteVendor('${v.id}')">✕</button></div>`;});
    if(!S.vendors.length)h+=`<div class="empty">No vendors yet.</div>`;
  } else {
    S.inventory.filter(i=>i.is_active).forEach(i=>{
      const low=i.qty_on_hand<=i.low_stock_threshold;
      h+=`<div class="erow"><div><div style="font-size:13px;font-weight:700">${i.name}${i.sku?` <span style="font-size:10px;color:var(--t3)">${i.sku}</span>`:''}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${i.category||'—'} · ${i.qty_on_hand} ${i.unit||'each'}${low?` <span style="color:var(--red);font-weight:800">LOW</span>`:''}</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:800;color:var(--gold)">${fmt2(i.sell_price||0)}</div><div style="font-size:10px;color:var(--t3)">cost: ${fmt2(i.cost_price||0)}</div><button class="del" style="margin-top:4px" onclick="deleteInventory('${i.id}')">✕</button></div></div>`;
    });
    if(!S.inventory.filter(i=>i.is_active).length)h+=`<div class="empty">No inventory items yet.</div>`;
  }
  return h;
}

// ─── P&L REPORT ───────────────────────────────────────────
function rReport(){
  const y=yn(),now=new Date();
  const compJ=S.jobs.filter(j=>j.status==='Complete'&&new Date((j.completed_date||j.scheduled_date||td())+'T00:00:00').getFullYear()===y);
  const ytdE=S.expenses.filter(e=>new Date(e.date+'T00:00:00').getFullYear()===y);
  const s=calcStats(compJ,ytdE);
  const plc=s.net>=0?'var(--grn)':'var(--red)';
  const gmc=s.grossMargin>=40?'var(--grn)':s.grossMargin>=20?'var(--gold)':'var(--red)';
  const ytdDraws=S.draws.filter(d=>new Date(d.date+'T00:00:00').getFullYear()===y).reduce((sum,d)=>sum+d.amount,0);
  const retained=s.net-ytdDraws;
  const ar=S.invoices.filter(i=>i.status==='Sent'||i.status==='Partial'||i.status==='Overdue').reduce((sum,i)=>sum+(i.total||0)-(i.amt_received||0),0);

  let h=`<div style="margin-bottom:10px"><button class="addbtn" style="width:100%" onclick="exportCSV()">⬇ Export CSV</button></div>`;
  h+=`<div class="sl">${y} Income Statement</div><div class="card"><table class="yt"><tr><td style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1px" colspan="2">REVENUE</td></tr><tr><td class="lb">Gross Revenue</td><td style="color:var(--gold)">${fmt(s.rev)}</td></tr><tr><td class="lb">Outstanding A/R</td><td style="color:var(--red)">${fmt(ar)}</td></tr><tr><td style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1px;padding-top:10px" colspan="2">COST OF GOODS SOLD</td></tr><tr><td class="lb sb2">Materials</td><td style="color:var(--t2)">-${fmt(s.mat)}</td></tr><tr><td class="lb sb2">Labor</td><td style="color:var(--t2)">-${fmt(s.lab)}</td></tr><tr><td class="lb sb2">Mileage</td><td style="color:var(--t2)">-${fmt(s.mil)}</td></tr><tr class="total-row"><td>Gross Profit</td><td style="color:${gmc}">${fmt(s.gross)} (${pct(s.grossMargin)})</td></tr><tr><td style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1px;padding-top:10px" colspan="2">OPERATING EXPENSES</td></tr><tr><td class="lb sb2">Fixed</td><td style="color:var(--t2)">-${fmt(s.fixed)}</td></tr><tr><td class="lb sb2">Variable</td><td style="color:var(--t2)">-${fmt(s.variable)}</td></tr><tr><td class="lb sb2">One-Time</td><td style="color:var(--t2)">-${fmt(s.onetime)}</td></tr><tr class="total-row"><td>Net Operating Profit</td><td style="color:${plc}">${fmt(s.net)} (${pct(s.netMargin)})</td></tr><tr><td style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1px;padding-top:10px" colspan="2">DISTRIBUTIONS</td></tr><tr><td class="lb sb2">Owner Draws</td><td style="color:var(--t2)">-${fmt(ytdDraws)}</td></tr><tr class="total-row"><td>Retained Earnings</td><td style="color:${retained>=0?'var(--grn)':'var(--red)'}">${fmtS(retained)}</td></tr></table></div>`;

  h+=`<div class="sl" style="margin-top:4px">Monthly</div><div class="card" style="padding:13px 14px">`;
  const maxR=Math.max(...MONTHS.map((_,i)=>compJ.filter(j=>smf(j.completed_date||j.scheduled_date,i,y)).reduce((s,j)=>s+(j.revenue||0),0)),1);
  MONTHS.forEach((m,i)=>{const mj=compJ.filter(j=>smf(j.completed_date||j.scheduled_date,i,y));const me=ytdE.filter(e=>smf(e.date,i,y));const ms=calcStats(mj,me);const w=ms.rev>0?Math.round(ms.rev/maxR*100):0;const pc=ms.net>=0?'var(--grn)':'var(--red)';const fut=i>now.getMonth()&&y===now.getFullYear();h+=`<div class="mrow" style="${fut?'opacity:.3':''}"><div class="mn2">${m}</div><div class="mbw"><div class="mb" style="width:${w}%"></div></div><div class="mrv">${ms.rev?fmt(ms.rev):'—'}</div><div class="mpr" style="color:${pc}">${ms.rev?fmtS(ms.net):'—'}</div></div>`;});
  h+=`</div>`;

  h+=`<div class="sl" style="margin-top:4px">By Job Type</div><div class="card" style="padding:13px 14px">`;
  const td2={};compJ.forEach(j=>{if(!td2[j.job_type])td2[j.job_type]={cnt:0,rev:0,gp:0};td2[j.job_type].cnt++;td2[j.job_type].rev+=(j.revenue||0);td2[j.job_type].gp+=((j.revenue||0)-(j.materials_cost||0)-(j.labor_cost||0)-(j.mileage_amt||0));});
  if(!Object.keys(td2).length)h+=`<div style="color:var(--t3);font-size:12px;padding:6px 0;font-weight:600">Complete jobs to see breakdown</div>`;
  else Object.entries(td2).sort((a,b)=>b[1].rev-a[1].rev).forEach(([type,d])=>{const m=d.rev>0?d.gp/d.rev*100:0;h+=`<div class="trow"><div><div style="font-size:12px;color:var(--t2);font-weight:600">${type}</div><div style="font-size:10px;color:var(--t3);font-weight:500;margin-top:1px">${d.cnt} job${d.cnt>1?'s':''} · avg ${fmt(d.rev/d.cnt)}</div></div><div style="font-size:15px;font-weight:800;color:${cc(m)}">${pct(m)}</div></div>`;});
  h+=`</div>`;
  return h;
}

function exportCSV(){
  const jH='Date,Client,Job Type,Technician,Revenue,Materials,Labor,Miles,Mileage,Gross Profit,Margin%,Status\n';
  const jR=S.jobs.map(j=>{const c=getC(j.client_id);const gp=(j.revenue||0)-(j.materials_cost||0)-(j.labor_cost||0)-(j.mileage_amt||0);const m=(j.revenue||0)>0?gp/(j.revenue||1)*100:0;return`${j.scheduled_date},"${c?.name||'Unknown'}","${j.job_type}","${j.technician}",${j.revenue||0},${j.materials_cost||0},${j.labor_cost||0},${j.miles||0},${j.mileage_amt||0},${gp.toFixed(2)},${m.toFixed(1)},"${j.status}"`;}).join('\n');
  const eH='\n\nDate,Category,Type,Amount,Notes\n';
  const eR=S.expenses.map(e=>`${e.date},"${e.category}","${e.type}",${e.amount},"${e.notes||''}"`).join('\n');
  const iH='\n\nInvoice#,Client,Total,Status,Due Date\n';
  const iR=S.invoices.map(i=>{const c=getC(i.client_id);return`"${i.number}","${c?.name||'Unknown'}",${(i.total||0).toFixed(2)},"${i.status}","${i.due_date||''}"`}).join('\n');
  const csv=jH+jR+eH+eR+iH+iR;
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`EverGuard_${yn()}_Export.csv`;a.click();
}

// ─── TASKS ────────────────────────────────────────────────
function rTasks(){
  if(S.showAddTask)return rAddTaskForm();
  const open=S.tasks.filter(t=>t.status==='open');
  const done=S.tasks.filter(t=>t.status==='done');
  if(!S.tasks.length)return`<div class="empty">No tasks yet.<br>Tap <strong>+ Task</strong> to add one.</div>`;
  let h='';
  if(open.length){h+=`<div class="sl">Open (${open.length})</div>`;open.forEach(t=>h+=renderTask(t));}
  if(done.length){h+=`<div class="sl" style="margin-top:8px">Completed</div>`;done.forEach(t=>h+=renderTask(t));}
  return h;
}

function renderTask(t){
  const ac=t.assigned_to==='Drew'?'ta-drew':t.assigned_to==='Jaime'?'ta-jaime':'ta-both';
  const canDelete=isOwn()||(t.created_by===S.role);
  return`<div class="task-row"><div style="display:flex;align-items:flex-start;gap:10px"><div class="chk ${t.status==='done'?'dn':''}" onclick="toggleTask('${t.id}')">${t.status==='done'?`<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="#050d08" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--tx);${t.status==='done'?'text-decoration:line-through;color:var(--t3)':''}">${t.title}</div>${t.description?`<div style="font-size:12px;color:var(--t2);margin-top:4px">${t.description}</div>`:''}<div style="margin-top:6px;display:flex;align-items:center;gap:8px"><span class="task-assign ${ac}">${t.assigned_to}</span>${t.due_date?`<span style="font-size:10px;color:var(--t3);font-weight:600">${sfmt(t.due_date)}</span>`:''}</div></div>${canDelete?`<button class="del" onclick="deleteTask('${t.id}')">✕</button>`:''}</div></div>`;
}

function rAddTaskForm(){return`<div class="card"><div class="field"><div class="fl">Title *</div><input class="inp" id="tf-title" placeholder="What needs to get done?"></div><div class="field"><div class="fl">Description</div><textarea class="inp" id="tf-desc" rows="2" style="resize:vertical" placeholder="Details, instructions..."></textarea></div><div class="field"><div class="fl">Assign To</div><div class="assign-row"><button class="assign-opt ao-drew ${S.taskAssign==='Drew'?'on':''}" onclick="S.taskAssign='Drew';render()">Drew</button><button class="assign-opt ao-jaime ${S.taskAssign==='Jaime'?'on':''}" onclick="S.taskAssign='Jaime';render()">Jaime</button><button class="assign-opt ao-both ${S.taskAssign==='Both'?'on':''}" onclick="S.taskAssign='Both';render()">Both</button></div></div><div class="field"><div class="fl">Due Date</div><input type="date" class="inp" id="tf-due"></div><div class="brow"><button class="btnc" onclick="S.showAddTask=false;render()">Cancel</button><button class="btns" onclick="saveTask()">Add Task</button></div></div>`;}
async function saveTask(){const title=(document.getElementById('tf-title')?.value||'').trim();if(!title)return;const data={title,description:document.getElementById('tf-desc')?.value||'',assigned_to:S.taskAssign,created_by:S.role,status:'open',due_date:document.getElementById('tf-due')?.value||null};try{const r=await dbInsert('tasks',data);S.tasks.unshift(r);S.showAddTask=false;render();}catch(e){alert('Error: '+e.message);}}
async function toggleTask(id){const t=S.tasks.find(t=>t.id===id);const status=t?.status==='open'?'done':'open';try{await dbUpdate('tasks',id,{status});S.tasks=S.tasks.map(t=>t.id===id?{...t,status}:t);render();}catch(e){alert('Error: '+e.message);}}
async function deleteTask(id){if(!confirm('Delete?'))return;try{await dbDelete('tasks',id);S.tasks=S.tasks.filter(t=>t.id!==id);render();}catch(e){alert('Error: '+e.message);}}

// ─── SETTINGS ─────────────────────────────────────────────
function rSettings(){
  return`<div class="scroll"><div class="sl">Accounts</div><div class="card"><div class="settings-row"><div><div style="font-size:14px;font-weight:700">Drew</div><div style="font-size:11px;color:var(--t3);margin-top:2px">Owner · Full access</div></div><div style="display:flex;gap:8px;align-items:center"><span class="rbadge rb-own">OWNER</span><button class="csm" onclick="S.changingPin='owner';render()">Change PIN</button></div></div><div class="settings-row"><div><div style="font-size:14px;font-weight:700">Jaime</div><div style="font-size:11px;color:var(--t3);margin-top:2px">Partner · All tabs</div></div><div style="display:flex;gap:8px;align-items:center"><span class="rbadge rb-par">PARTNER</span><button class="csm" onclick="S.changingPin='partner';render()">Change PIN</button></div></div></div>
  ${S.changingPin?`<div class="card"><div class="fl" style="margin-bottom:8px">New PIN for ${S.changingPin==='owner'?'Drew':'Jaime'}</div><input type="number" class="inp" id="np" placeholder="4 digits" style="letter-spacing:6px;font-size:20px;text-align:center;margin-bottom:12px"><div class="brow"><button class="btnc" onclick="S.changingPin=null;render()">Cancel</button><button class="btns" onclick="doChangePin()">Save</button></div></div>`:''}
  <div class="sl" style="margin-top:4px">App Lists (Job Types, Technicians)</div><div class="card"><div style="font-size:12px;color:var(--t2)">Manage dropdown options for job types, technicians, and expense categories.</div><div style="margin-top:12px">${['job_type','technician','expense_category'].map(type=>{const items=getLists(type);return`<div style="margin-bottom:12px"><div style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">${type.replace('_',' ')}</div><div style="display:flex;flex-wrap:wrap;gap:6px">${items.map(v=>`<span style="background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--t2)">${v}</span>`).join('')}</div></div>`;}).join('')}</div><div style="font-size:11px;color:var(--t3);margin-top:8px">To add custom options, go to Settings → Lists in the next update.</div></div>
  <div class="sl" style="margin-top:4px">Sync Status</div><div class="card"><div style="font-size:13px;color:var(--grn);font-weight:700">● Connected to Supabase</div><div style="font-size:11px;color:var(--t3);margin-top:4px">West US (Oregon) · Real-time sync active</div></div></div>`;
}
function doChangePin(){const v=(document.getElementById('np')?.value||'').trim();if(v.length!==4||isNaN(v))return;const pins=getPins();pins[S.changingPin]=v;savePins(pins);S.changingPin=null;render();}

// ─── MAP ──────────────────────────────────────────────────
function rMapModal(){return`<div class="modal-ov"><div class="modal-hdr"><div class="modal-title">Client Location</div><button class="close-btn" onclick="S.showMap=false;render()">×</button></div><div id="map-container" style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;"><div style="color:var(--t2);font-size:13px;font-weight:600">Loading map...</div></div><div class="map-info"><div style="display:flex;gap:20px"><div><div class="map-stat-v" id="eta-val">—</div><div class="map-stat-l">ETA</div></div><div><div class="map-stat-v" id="dist-val">—</div><div class="map-stat-l">Distance</div></div></div><div style="font-size:12px;color:var(--t2);margin-top:8px">${S.mapAddr}</div></div></div>`;}
function previewMap(){const a=(document.getElementById('cf-addr')?.value||'').trim();if(a)openMap(a);}
function openMap(addr){S.showMap=true;S.mapAddr=addr;render();}
function loadLeaflet(){return new Promise(res=>{if(window.L){res();return;}const css=document.createElement('link');css.rel='stylesheet';css.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';document.head.appendChild(css);const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';s.onload=res;document.head.appendChild(s);});}

async function initMap(addr){
  const mc=document.getElementById('map-container');if(!mc)return;
  mc.innerHTML='<div style="color:var(--t2);font-size:13px;font-weight:600;margin:auto">Locating...</div>';
  try{
    await loadLeaflet();
    const geo=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`,{headers:{'User-Agent':'EverGuardOS/1.0'}});
    const gd=await geo.json();if(!gd.length){mc.innerHTML='<div style="color:var(--red);font-size:13px;margin:auto">Address not found</div>';return;}
    const clat=parseFloat(gd[0].lat),clng=parseFloat(gd[0].lon);mc.innerHTML='';
    const map=L.map(mc).setView([clat,clng],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(map);
    const ci=L.divIcon({html:'<div style="background:#DBB183;border:3px solid #050d08;border-radius:50%;width:16px;height:16px;"></div>',iconSize:[16,16],iconAnchor:[8,8]});
    L.marker([clat,clng],{icon:ci}).addTo(map).bindPopup(addr).openPopup();
    navigator.geolocation.getCurrentPosition(async pos=>{
      const ulat=pos.coords.latitude,ulng=pos.coords.longitude;
      const ui=L.divIcon({html:'<div style="background:#60a5fa;border:3px solid #050d08;border-radius:50%;width:16px;height:16px;"></div>',iconSize:[16,16],iconAnchor:[8,8]});
      L.marker([ulat,ulng],{icon:ui}).addTo(map).bindPopup('You');
      map.fitBounds([[ulat,ulng],[clat,clng]],{padding:[30,30]});
      try{const rt=await fetch(`https://router.project-osrm.org/route/v1/driving/${ulng},${ulat};${clng},${clat}?overview=full&geometries=geojson`);const rd=await rt.json();if(rd.routes?.length){L.geoJSON(rd.routes[0].geometry,{style:{color:'#DBB183',weight:4,opacity:.8}}).addTo(map);const mins=Math.round(rd.routes[0].duration/60);const mi=(rd.routes[0].distance*0.000621371).toFixed(1);const ev=document.getElementById('eta-val'),dv=document.getElementById('dist-val');if(ev)ev.textContent=mins<60?`${mins} min`:`${Math.floor(mins/60)}h ${mins%60}m`;if(dv)dv.textContent=`${mi} mi`;}}catch(e){}
      map.invalidateSize();
    },()=>map.invalidateSize(),{timeout:8000});
  }catch(e){const mc2=document.getElementById('map-container');if(mc2)mc2.innerHTML='<div style="color:var(--red);font-size:13px;margin:auto">Map unavailable</div>';}
}

// ─── GOAL ─────────────────────────────────────────────────
async function saveGoal(){
  const v=parseInt(document.getElementById('goal-inp')?.value||0);
  if(v>0){S.goal=v;localStorage.setItem('eg_goal',v);}
  S.editingGoal=false;render();
}


function prefillInvoiceItems(){
  if(!S.invPrefill||!S.invPrefill.length)return;
  S.invPrefill.forEach(li=>{
    addInvLI('custom');
    const rows=document.querySelectorAll('#inv-li-con .li-row');
    const r=rows[rows.length-1];
    if(r){
      const d=r.querySelector('.li-desc');
      const q=r.querySelector('.li-qty');
      const p=r.querySelector('.li-price');
      if(d)d.value=li.description||'';
      if(q)q.value=li.qty||1;
      if(p)p.value=li.sell_price||0;
    }
  });
  updateDocTotal('inv-total','inv-li-con');
  S.invPrefill=[];
}

// ─── INIT ─────────────────────────────────────────────────
S.goal=parseInt(localStorage.getItem('eg_goal'))||5000;
loadAll().then(()=>render());
</script>

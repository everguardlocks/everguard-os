<script>

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const JTYPES=['Commercial Locksmith','Access Control','Master Key System','Safe Service','Security Consulting','Residential','Emergency Call-Out','PDK Badge System','Other'];

const CUR=[
  {id:'fin',title:'Financial Fluency',icon:'💰',lessons:[{id:'f1',title:'Understanding Your Cost Floor'},{id:'f2',title:'Pricing Strategy Fundamentals'},{id:'f3',title:'Reading a P&L Statement'},{id:'f4',title:'Cash Flow vs. Profit'},{id:'f5',title:'SBA Loan Prep Basics'},{id:'f6',title:'QuickBooks Reconciliation'}]},
  {id:'sal',title:'Sales & Persuasion',icon:'🤝',lessons:[{id:'s1',title:'Commercial Sales Psychology'},{id:'s2',title:'Objection Handling'},{id:'s3',title:'Proposal Writing'},{id:'s4',title:'Follow-Up Systems'},{id:'s5',title:'Closing Techniques'}]},
  {id:'exc',title:'Executive Communication',icon:'🎯',lessons:[{id:'e1',title:'High-Stakes Conversations'},{id:'e2',title:'Writing for Decision Makers'},{id:'e3',title:'Presenting Ideas Structurally'},{id:'e4',title:'Negotiation Fundamentals'}]},
  {id:'cog',title:'Business Owner Cognition',icon:'🧠',lessons:[{id:'m1',title:'Systems Thinking for Owners'},{id:'m2',title:'Decision Making Under Uncertainty'},{id:'m3',title:'Managing Cognitive Load'},{id:'m4',title:'Identity & Authority'}]},
  {id:'lnx',title:'Linux & Tech',icon:'⚡',lessons:[{id:'l1',title:'Fedora Filesystem & Shell Basics'},{id:'l2',title:'System Hardening (Lynis, Fail2ban)'},{id:'l3',title:'Network Security Fundamentals'},{id:'l4',title:'Automation with Python & Cron'},{id:'l5',title:'Tailscale & Home Network'},{id:'l6',title:'Wireshark & Traffic Analysis'}]},
  {id:'sec',title:'Security & EverGuard',icon:'🔐',lessons:[{id:'sg1',title:'Access Control Systems'},{id:'sg2',title:'Master Key System Design'},{id:'sg3',title:'Physical Security Assessment'},{id:'sg4',title:'Digital + Physical Convergence'}]}
];

let S={li:false,role:null,pins:{owner:'1111',partner:'2222'},su:'owner',pin:'',perr:'',tab:'dash',fsub:'jobs',jobs:[],expenses:[],recurring:[],drafts:[],lessons:{},custMod:[],custLes:{},goal:5000,showAddJob:false,showAddExp:false,showAddRec:false,showAddIntake:false,showAddMod:false,showAddLes:false,showSettings:false,showMap:false,mapAddr:'',mapErr:'',changingPin:null,priority:'Normal',payStatus:'unpaid',finalizingDraft:null,editingGoal:false};

const today=()=>new Date().toISOString().split('T')[0];
const fmt=n=>'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtS=n=>(n<0?'-':'+')+fmt(n);
const pct=n=>n.toFixed(1)+'%';
const matT=ms=>(ms||[]).reduce((s,m)=>s+m.cost,0);
const cc=m=>m>=40?'cg':m>=20?'co':'cl';
const allMod=()=>[...CUR,...S.custMod];
const allLes=mid=>{const b=allMod().find(m=>m.id===mid);return[...(b?.lessons||[]),...(S.custLes[mid]||[])];};

function calcS(jobs,exps){
  const rev=jobs.reduce((s,j)=>s+j.revenue,0);
  const mat=jobs.reduce((s,j)=>s+matT(j.materials),0);
  const lab=jobs.reduce((s,j)=>s+j.laborCost,0);
  const mil=jobs.reduce((s,j)=>s+(j.mileageAmt||0),0);
  const ovh=exps.reduce((s,e)=>s+e.amount,0);
  const cost=mat+lab+mil+ovh;const net=rev-cost;
  return{rev,mat,lab,mil,ovh,cost,net,margin:rev>0?net/rev*100:0,cnt:jobs.length};
}
function tmf(d){const n=new Date(),dt=new Date(d+'T00:00:00');return dt.getMonth()===n.getMonth()&&dt.getFullYear()===n.getFullYear();}
function smf(d,m,y){const dt=new Date(d+'T00:00:00');return dt.getMonth()===m&&dt.getFullYear()===y;}

// STORAGE — localStorage for deployed PWA
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function ldAll(){
  S.pins=lsGet('eg_pins')||{owner:'1111',partner:'2222'};
  S.jobs=lsGet('eg_jobs_v5')||[];
  S.expenses=lsGet('eg_exp_v2')||[];
  S.recurring=lsGet('eg_rec_v1')||[];
  S.drafts=lsGet('eg_drafts_v1')||[];
  S.lessons=lsGet('eg_les_v2')||{};
  S.custMod=lsGet('eg_cmod')||[];
  S.custLes=lsGet('eg_cles')||{};
  S.goal=lsGet('eg_goal')||5000;
  checkRecurring();
}
const sv=(k,v)=>lsSet(k,v);

function checkRecurring(){
  const now=new Date();let changed=false;
  S.recurring.forEach(r=>{
    let due=false;
    if(!r.lastLogged){due=true;}
    else{const last=new Date(r.lastLogged+'T00:00:00');
      if(r.frequency==='Weekly')due=(now-last)>=7*864e5;
      else if(r.frequency==='Monthly')due=now.getMonth()!==last.getMonth()||now.getFullYear()!==last.getFullYear();
      else if(r.frequency==='Quarterly'){const md=(now.getFullYear()-last.getFullYear())*12+now.getMonth()-last.getMonth();due=md>=3;}
    }
    if(due){S.expenses.unshift({id:'rc_'+Date.now()+'_'+Math.random(),date:today(),category:r.category,amount:r.amount,notes:(r.notes||'')+'  [Auto]',isRecurring:true});r.lastLogged=today();changed=true;}
  });
  if(changed){sv('eg_exp_v2',S.expenses);sv('eg_rec_v1',S.recurring);}
}

function selUser(u){S.su=u;S.pin='';S.perr='';render();}
function numP(n){if(S.pin.length>=4)return;S.pin+=n;S.perr='';upDots();if(S.pin.length===4)setTimeout(tryLogin,120);}
function numD(){S.pin=S.pin.slice(0,-1);upDots();}
function upDots(){document.querySelectorAll('.pdot').forEach((d,i)=>d.classList.toggle('on',i<S.pin.length));}
function tryLogin(){if(S.pin===S.pins[S.su]){S.li=true;S.role=S.su;S.tab='dash';S.pin='';S.perr='';render();}else{S.perr='Incorrect PIN';S.pin='';upDots();const e=document.querySelector('.lerr');if(e)e.textContent=S.perr;}}
function logout(){S.li=false;S.role=null;S.pin='';S.perr='';S.showSettings=false;S.tab='dash';render();}

function goTab(t){
  S.tab=t;S.activeModule=null;S.activeLesson=null;S.showAddJob=false;S.showAddExp=false;S.showAddIntake=false;S.showAddMod=false;S.showAddLes=false;S.showSettings=false;S.showMap=false;S.finalizingDraft=null;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const b=document.querySelector(`[data-tab="${t}"]`);if(b)b.classList.add('on');
  render();
}

function render(){
  const app=document.getElementById('app');
  if(!S.li){app.innerHTML=rLogin();return;}
  const tabs=isOwn()?['dash','intake','finance','learn']:['dash','intake','finance'];
  const tl={dash:'Home',intake:'Intake',finance:'Finance',learn:'Learn'};
  const ti={dash:'◈',intake:'✦',finance:'◉',learn:'◎'};
  const nav=tabs.map(t=>`<button class="nb ${S.tab===t?'on':''}" data-tab="${t}" onclick="goTab('${t}')"><span class="ni">${ti[t]}</span><span class="nl">${tl[t]}</span></button>`).join('');
  let title='Dashboard',action='';
  if(S.showSettings){title='Settings';}
  else if(S.showMap){title='Client Location';}
  else if(S.tab==='intake'){title=S.showAddIntake?'New Intake':'Intake Queue';}
  else if(S.tab==='finance'){
    if(S.finalizingDraft){title='Finalize Job';}
    else if(S.showAddJob){title='New Job';}
    else if(S.showAddExp){title='New Expense';}
    else{title='Finance';if(S.fsub==='jobs')action=`<button class="addbtn" onclick="openAddJob()">+ Job</button>`;else if(S.fsub==='expenses')action=`<button class="addbtn" onclick="S.showAddExp=true;render()">+ Expense</button>`;}
  }
  else if(S.tab==='learn'&&S.activeModule){const m=allMod().find(m=>m.id===S.activeModule);title=m?.title||'Module';action=`<button class="backbtn" onclick="S.activeModule=null;S.activeLesson=null;S.showAddLes=false;render()">← Back</button>`;}
  const rl=isOwn()?`<span class="rbadge rb-own">OWNER</span>`:`<span class="rbadge rb-par">PARTNER</span>`;
  const mapOv=S.showMap?rMapModal():'';
  app.innerHTML=`<div class="hdr"><div><div class="hbrand">EverGuard Lock &amp; Safe</div><div class="htitle">${title}</div></div><div class="hright">${action}${isOwn()&&!action&&!S.showMap?`<button class="ibtn" onclick="S.showSettings=!S.showSettings;render()">⚙</button>`:''} ${rl}<button class="lout" onclick="logout()">Exit</button></div></div><div class="scroll" id="main">${rMain()}</div><nav class="bnav">${nav}</nav>${mapOv}`;
  if(S.showMap)setTimeout(()=>initMap(S.mapAddr),200);
}

function rMain(){
  if(S.showSettings)return rSettings();
  if(S.tab==='dash')return rDash();
  if(S.tab==='intake')return rIntake();
  if(S.tab==='finance')return rFinance();
  if(S.tab==='learn')return rLearn();

}

function rDash(){
  const now=new Date(),y=now.getFullYear();
  const ytdJ=S.jobs.filter(j=>new Date(j.date+'T00:00:00').getFullYear()===y);
  const ytdE=S.expenses.filter(e=>new Date(e.date+'T00:00:00').getFullYear()===y);
  const mJ=S.jobs.filter(j=>tmf(j.date)),mE=S.expenses.filter(e=>tmf(e.date));
  const ytd=calcS(ytdJ,ytdE),mo=calcS(mJ,mE);
  const plc=ytd.net>=0?'var(--grn)':'var(--red)',moc=mo.net>=0?'var(--grn)':'var(--red)';
  const outstanding=S.jobs.filter(j=>j.payStatus==='unpaid'||j.payStatus==='partial').reduce((s,j)=>s+(j.payStatus==='unpaid'?j.revenue:(j.revenue-(j.amtReceived||0))),0);
  const goalPct=Math.min(Math.round(mo.rev/S.goal*100),100);
  const goalC=goalPct>=100?'var(--grn)':goalPct>=60?'var(--gold)':'var(--red)';
  let h=`<div class="datesub">${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>`;
  h+=`<div class="plb"><div class="pll">Net P&L — ${y} YTD</div><div class="plv" style="color:${plc}">${fmtS(ytd.net)}</div><div class="plm">Margin: <strong style="color:${plc}">${pct(ytd.margin)}</strong> &nbsp;·&nbsp; ${ytd.cnt} jobs &nbsp;·&nbsp; <span style="color:var(--red)">A/R: ${fmt(outstanding)}</span></div><div class="plr"><div><div class="pli-v">${fmt(ytd.rev)}</div><div class="pli-l">YTD Revenue</div></div><div><div class="pli-v" style="color:var(--red)">${fmt(ytd.cost)}</div><div class="pli-l">Total Costs</div></div><div><div class="pli-v" style="color:${moc}">${fmtS(mo.net)}</div><div class="pli-l">This Month</div></div></div></div>`;
  h+=`<div class="goal-bar"><div class="goal-row"><div><div style="font-size:13px;font-weight:700">Monthly Goal</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${fmt(mo.rev)} of ${fmt(S.goal)}</div></div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:16px;font-weight:800;color:${goalC}">${goalPct}%</span>${isOwn()?`<button onclick="S.editingGoal=!S.editingGoal;render()" class="csm">Edit</button>`:''}</div></div>${S.editingGoal&&isOwn()?`<div style="display:flex;gap:8px;margin-top:8px"><input type="number" class="inp" id="goal-inp" placeholder="Monthly goal" value="${S.goal}" style="flex:1"><button class="ssm" onclick="saveGoal()">Save</button></div>`:`<div class="prog-bg" style="height:8px;"><div class="prog-fill" style="width:${goalPct}%;background:${goalC}"></div></div>`}</div>`;
  const avg=ytd.cnt>0?ytd.rev/ytd.cnt:0;
  h+=`<div class="sgrid"><div class="sc g"><div class="sc-v">${fmt(mo.rev)}</div><div class="sc-l">This Month</div></div><div class="sc b"><div class="sc-v">${ytd.cnt}</div><div class="sc-l">Jobs YTD</div></div><div class="sc gr"><div class="sc-v">${fmt(avg)}</div><div class="sc-l">Avg/Job</div></div><div class="sc r"><div class="sc-v">${fmt(outstanding)}</div><div class="sc-l">Outstanding A/R</div></div></div>`;
  if(S.drafts.length>0){h+=`<div class="sl">Pending Intake (${S.drafts.length})</div>`;S.drafts.slice(0,2).forEach(d=>{const pc=d.priority==='Urgent'?'var(--red)':d.priority==='Low'?'var(--grn)':'var(--gold)';h+=`<div class="intake-card"><div class="ic-top"><div><div class="ic-name">${d.clientName}</div><div class="ic-type">${d.jobType}</div></div><span style="font-size:10px;font-weight:800;color:${pc}">${d.priority.toUpperCase()}</span></div></div>`;});}
  if(isOwn()){const tL=allMod().reduce((s,m)=>s+allLes(m.id).length,0);const dL=Object.values(S.lessons).filter(l=>l.completed).length;const lp=tL>0?Math.round(dL/tL*100):0;h+=`<div class="sl">Learning</div><div class="card" style="padding:12px"><div style="display:flex;justify-content:space-between;margin-bottom:7px;"><span style="font-size:13px;font-weight:700">Curriculum</span><span style="font-size:12px;color:var(--gold);font-weight:800">${dL}/${tL} · ${lp}%</span></div><div class="prog-bg" style="height:6px;"><div class="prog-fill" style="width:${lp}%"></div></div></div>`;}
  return h;
}

function loadLeaflet(){return new Promise(res=>{if(window.L){res();return;}const css=document.createElement('link');css.rel='stylesheet';css.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';document.head.appendChild(css);const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';s.onload=res;document.head.appendChild(s);});}

async function initMap(addr){
  const mc=document.getElementById('map-container');if(!mc)return;
  mc.innerHTML='<div style="color:var(--t2);font-size:13px;font-weight:600;margin:auto">Geocoding address...</div>';
  try{
    await loadLeaflet();
    const geo=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`,{headers:{'User-Agent':'EverGuardOS/1.0'}});
    const gd=await geo.json();
    if(!gd.length){mc.innerHTML='<div style="color:var(--red);font-size:13px;margin:auto">Address not found</div>';return;}
    const clat=parseFloat(gd[0].lat),clng=parseFloat(gd[0].lon);
    mc.innerHTML='';
    const map=L.map(mc,{zoomControl:true}).setView([clat,clng],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
    const ci=L.divIcon({html:'<div style="background:#DBB183;border:3px solid #050d08;border-radius:50%;width:18px;height:18px;"></div>',iconSize:[18,18],iconAnchor:[9,9]});
    L.marker([clat,clng],{icon:ci}).addTo(map).bindPopup(`<strong>${addr}</strong>`).openPopup();
    navigator.geolocation.getCurrentPosition(async pos=>{
      const ulat=pos.coords.latitude,ulng=pos.coords.longitude;
      const ui=L.divIcon({html:'<div style="background:#60a5fa;border:3px solid #050d08;border-radius:50%;width:18px;height:18px;"></div>',iconSize:[18,18],iconAnchor:[9,9]});
      L.marker([ulat,ulng],{icon:ui}).addTo(map).bindPopup('Your location');
      map.fitBounds([[ulat,ulng],[clat,clng]],{padding:[30,30]});
      try{
        const rt=await fetch(`https://router.project-osrm.org/route/v1/driving/${ulng},${ulat};${clng},${clat}?overview=full&geometries=geojson`);
        const rd=await rt.json();
        if(rd.routes?.length){
          L.geoJSON(rd.routes[0].geometry,{style:{color:'#DBB183',weight:4,opacity:.8}}).addTo(map);
          const mins=Math.round(rd.routes[0].duration/60);const miles=(rd.routes[0].distance*0.000621371).toFixed(1);
          const ev=document.getElementById('eta-val'),dv=document.getElementById('dist-val');
          if(ev)ev.textContent=mins<60?`${mins} min`:`${Math.floor(mins/60)}h ${mins%60}m`;
          if(dv)dv.textContent=`${miles} mi`;
        }
      }catch(e){}
      map.invalidateSize();
    },()=>{map.invalidateSize();const ev=document.getElementById('eta-val');if(ev)ev.textContent='GPS off';},{timeout:8000});
  }catch(e){const mc2=document.getElementById('map-container');if(mc2)mc2.innerHTML='<div style="color:var(--red);font-size:13px;margin:auto">Map unavailable</div>';}
}

function rJobs(){
  const all=[...S.drafts.map(d=>({...d,isDraft:true})),...S.jobs];
  if(!all.length)return`<div class="empty">No jobs yet. Tap <strong>+ Job</strong> or use Intake.</div>`;
  let h='';
  all.forEach(j=>{
    if(j.isDraft){const pc=j.priority==='Urgent'?'var(--red)':j.priority==='Low'?'var(--grn)':'var(--gold)';h+=`<div class="jrow"><div class="jtop"><div><div class="jn">${j.clientName}</div><div class="jt">${j.jobType}</div></div><div style="text-align:right"><span class="draft-badge">DRAFT</span><br><span style="font-size:10px;font-weight:800;color:${pc}">${j.priority}</span></div></div>${j.address?`<div style="font-size:11px;color:var(--t3);margin-top:6px">📍 ${j.address}</div>`:''}<div style="display:flex;gap:8px;margin-top:8px;align-items:center"><button class="fin-btn" onclick="startFinalize('${j.id}')">Finalize</button><button class="del" onclick="deleteDraft('${j.id}')">✕</button></div></div>`;}

function cyclePayStatus(id){
  const order=['unpaid','partial','paid'];
  S.jobs=S.jobs.map(j=>{
    if(j.id!==id)return j;
    const next=order[(order.indexOf(j.payStatus||'unpaid')+1)%3];
    let amtReceived=j.amtReceived||0;
    if(next==='partial'){const v=prompt('Amount received so far:','');amtReceived=parseFloat(v||0)||0;}
    if(next==='paid')amtReceived=j.revenue;
    return{...j,payStatus:next,amtReceived};
  });
  sv('eg_jobs_v5',S.jobs);render();
}

  MONTHS.forEach((m,i)=>{const mj=S.jobs.filter(j=>smf(j.date,i,y));const me=S.expenses.filter(e=>smf(e.date,i,y));const ms=calcS(mj,me);const w=ms.rev>0?Math.round(ms.rev/maxR*100):0;const pc=ms.net>=0?'var(--grn)':'var(--red)';const fut=i>now.getMonth()&&y===now.getFullYear();h+=`<div class="mrow" style="${fut?'opacity:.3':''}"><div class="mn2">${m}</div><div class="mbw"><div class="mb" style="width:${w}%"></div></div><div class="mrv">${ms.rev?fmt(ms.rev):'—'}</div><div class="mpr" style="color:${pc}">${ms.rev?fmtS(ms.net):'—'}</div></div>`;});

  h+=`</div>`;
  h+=`<div class="sl" style="margin-top:4px">Tech Split</div><div class="card" style="padding:13px 14px">`;
  let anyT=false;TECHS.forEach(tech=>{const tj=ytdJ.filter(j=>j.technician===tech);if(!tj.length)return;anyT=true;const ts=calcS(tj,[]);h+=`<div class="techrow"><div><div style="font-size:13px;font-weight:700">${tech}</div><div style="font-size:11px;color:var(--t3);font-weight:500">${tj.length} jobs · avg ${fmt(ts.rev/tj.length)}</div></div><div style="text-align:right"><div style="font-size:14px;font-weight:800;color:var(--gold)">${fmt(ts.rev)}</div><div style="font-size:11px;color:var(--t2);font-weight:600">${pct(ts.margin)}</div></div></div>`;});

  return h;

  const mod=allMod().find(m=>m.id===S.activeModule);if(!mod)return'';
  const lessons=allLes(S.activeModule);let h='';
  lessons.forEach(l=>{const key=`${S.activeModule}_${l.id}`;const d=S.lessons[key]||{};const op=S.activeLesson===l.id;const isC=!!(S.custLes[S.activeModule]||[]).find(cl=>cl.id===l.id);h+=`<div class="lrow2"><div class="ltop" onclick="S.activeLesson=S.activeLesson==='${l.id}'?null:'${l.id}';render()"><div class="chk ${d.completed?'dn':''}" onclick="event.stopPropagation();ckLesson('${S.activeModule}','${l.id}')">${d.completed?`<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" stroke="#050d08" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div><span class="lt ${d.completed?'dn':''}">${l.title}</span>${isC?`<button onclick="event.stopPropagation();delLes('${S.activeModule}','${l.id}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px">✕</button>`:''}<span style="color:var(--t3);font-size:12px;margin-left:4px">${op?'▲':'▼'}</span></div>${op?`<div style="padding-left:32px;margin-top:8px"><textarea class="nta" id="nt-${l.id}" placeholder="Notes...">${d.notes||''}</textarea><button onclick="svNote('${S.activeModule}','${l.id}')" style="margin-top:5px;background:var(--gbg);border:1px solid var(--gbr);color:var(--gold);padding:4px 11px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--f);font-weight:700">Save Notes</button></div>`:''}</div>`;});
  if(S.showAddLes)h+=`<div class="card" style="margin-top:4px"><div class="fl" style="margin-bottom:8px">New Lesson</div><div style="display:flex;gap:8px"><input class="cinp" id="nl-title" placeholder="Lesson title" style="flex:1"><button class="csm" onclick="S.showAddLes=false;render()">✕</button><button class="ssm" onclick="doAddLes('${S.activeModule}')">Add</button></div></div>`;
  else h+=`<button class="ghost" style="margin-top:4px" onclick="S.showAddLes=true;render()">+ Add Lesson</button>`;
  return h;
}
function doAddMod(){const t=(document.getElementById('nm-title')?.value||'').trim();if(!t)return;S.custMod.push({id:'cm_'+Date.now(),title:t,icon:document.getElementById('nm-icon')?.value.trim()||'📖'});sv('eg_cmod',S.custMod);S.showAddMod=false;render();}
function doAddLes(mid){const t=(document.getElementById('nl-title')?.value||'').trim();if(!t)return;if(!S.custLes[mid])S.custLes[mid]=[];S.custLes[mid].push({id:'cl_'+Date.now(),title:t});sv('eg_cles',S.custLes);S.showAddLes=false;render();}
function delMod(id){if(!confirm('Delete module?'))return;S.custMod=S.custMod.filter(m=>m.id!==id);sv('eg_cmod',S.custMod);render();}
function delLes(mid,lid){if(!confirm('Delete?'))return;S.custLes[mid]=(S.custLes[mid]||[]).filter(l=>l.id!==lid);sv('eg_cles',S.custLes);render();}
function ckLesson(mid,lid){const k=`${mid}_${lid}`;S.lessons[k]={...(S.lessons[k]||{}),completed:!S.lessons[k]?.completed};sv('eg_les_v2',S.lessons);render();}
function svNote(mid,lid){const k=`${mid}_${lid}`;S.lessons[k]={...(S.lessons[k]||{}),notes:document.getElementById(`nt-${lid}`)?.value||''};sv('eg_les_v2',S.lessons);}

function rSettings(){return`<div class="sl">Accounts</div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd)"><div><div style="font-size:14px;font-weight:700">Drew</div><div style="font-size:11px;color:var(--t3);margin-top:2px">Owner · Full access</div></div><div style="display:flex;gap:8px;align-items:center"><span class="rbadge rb-own">OWNER</span><button class="csm" onclick="S.changingPin='owner';render()">Change PIN</button></div></div><div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0"><div><div style="font-size:14px;font-weight:700">Jaime</div><div style="font-size:11px;color:var(--t3);margin-top:2px">Partner · Home, Intake, Finance</div></div><div style="display:flex;gap:8px;align-items:center"><span class="rbadge rb-par">PARTNER</span><button class="csm" onclick="S.changingPin='partner';render()">Change PIN</button></div></div></div>${S.changingPin?`<div class="card"><div class="fl" style="margin-bottom:8px">New PIN for ${S.changingPin==='owner'?'Drew':'Jaime'}</div><input type="number" class="inp" id="np" placeholder="4 digits" style="letter-spacing:6px;font-size:20px;text-align:center;margin-bottom:12px"><div class="brow"><button class="btnc" onclick="S.changingPin=null;render()">Cancel</button><button class="btns" onclick="doChangePin()">Save</button></div></div>`:''}<div class="sl" style="margin-top:4px">Access Levels</div><div class="card"><div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)"><div style="font-size:12px;color:var(--t2);font-weight:600">Dashboard</div><div style="font-size:11px;color:var(--grn);font-weight:700">Both</div></div><div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)"><div style="font-size:12px;color:var(--t2);font-weight:600">Intake</div><div style="font-size:11px;color:var(--grn);font-weight:700">Both</div></div><div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)"><div style="font-size:12px;color:var(--t2);font-weight:600">Finance</div><div style="font-size:11px;color:var(--grn);font-weight:700">Both</div></div><div style="display:flex;justify-content:space-between;padding:8px 0"><div style="font-size:12px;color:var(--t2);font-weight:600">Learning Hub</div><div style="font-size:11px;color:var(--gold);font-weight:700">Drew only</div></div></div>`;}
function doChangePin(){const v=(document.getElementById('np')?.value||'').trim();if(v.length!==4||isNaN(v))return;S.pins[S.changingPin]=v;sv('eg_pins',S.pins);S.changingPin=null;render();}

ldAll();render();
</script>
